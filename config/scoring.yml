# Scoring configuration for job prioritization

weights:
  must_match: 40        # Core skill matching (더 관대하게)
  seniority: 15         # Seniority level fit
  domain: 15            # Domain/industry fit
  work_type: 10         # Work type preference
  recency: 10           # Job posting recency
  language: 10          # Language requirements

penalties:
  red_flag: -5          # Red flag penalty per flag (더 관대하게)

thresholds:
  shortlist: 60         # Auto-shortlist threshold (더 낮게)
  consider: 45          # Consider threshold (더 낮게)

# User profile for scoring
user_profile:
  # Core technical skills (required) - 더 포괄적으로
  required_skills:
    - "python"
    - "java"
    - "javascript"
    - "backend"
    - "frontend"
    - "web development"
    - "api"
    - "database"

  # Nice-to-have skills - AI/ML 관련
  preferred_skills:
    - "llm"
    - "rag"
    - "machine learning"
    - "pytorch"
    - "tensorflow"
    - "fastapi"
    - "django"
    - "spring"
    - "react"
    - "aws"
    - "docker"
    - "kubernetes"
    - "postgresql"
    - "mysql"

  # Experience level
  seniority_level: "mid"

  # Preferred domains
  preferred_domains:
    - "fintech"
    - "healthcare"
    - "education"
    - "ecommerce"

  # Work arrangement preference
  work_type_preference: "hybrid"

  # Location preferences
  location_preference:
    - "Seoul"
    - "Pangyo"
    - "Remote"

  # Language capabilities
  language_skills:
    - "KR"
    - "EN"

# Tech stack synonyms for better matching
tech_synonyms:
  llm:
    - "large language model"
    - "생성AI"
    - "generative ai"
  rag:
    - "retrieval augmented generation"
    - "검색증강생성"
  ml:
    - "machine learning"
    - "머신러닝"
    - "기계학습"