# Scoring configuration for job prioritization
# 타겟: LLM/RAG Engineer (primary), ML Engineer (secondary)

weights:
  must_match: 45        # 핵심 스킬 매칭 (가장 중요)
  seniority: 15         # 시니어리티 적합도
  domain: 10            # 도메인 적합도
  work_type: 10         # 근무 형태
  recency: 10           # 공고 최신성
  language: 10          # 언어 요건

penalties:
  red_flag: -8          # 레드플래그 페널티

thresholds:
  shortlist: 70         # 70+ = 즉시 지원
  consider: 55          # 55-69 = 검토 후 지원

user_profile:
  # 핵심 스킬 — JD에 이것들이 있어야 의미 있는 공고
  required_skills:
    - "python"
    - "llm"
    - "rag"
    - "machine learning"
    - "nlp"
    - "deep learning"
    - "ai"

  # 우대 스킬 — 있으면 가산점
  preferred_skills:
    - "pytorch"
    - "langchain"
    - "langraph"
    - "vector database"
    - "embedding"
    - "transformer"
    - "fastapi"
    - "aws"
    - "docker"
    - "kubernetes"
    - "elasticsearch"
    - "postgresql"
    - "fine-tuning"
    - "prompt engineering"
    - "agent"
    - "mlops"

  # 경력 수준: 5-7년 mid-senior
  seniority_level: "senior"

  # 선호 도메인
  preferred_domains:
    - "fintech"
    - "healthcare"
    - "education"
    - "ecommerce"
    - "saas"

  # 근무 형태
  work_type_preference: "hybrid"

  # 지역
  location_preference:
    - "Seoul"
    - "Pangyo"
    - "Remote"

  # 언어
  language_skills:
    - "KR"
    - "EN"

# 기술 동의어 — 매칭 정확도 향상
tech_synonyms:
  llm:
    - "large language model"
    - "생성AI"
    - "generative ai"
    - "gpt"
    - "claude"
    - "대규모 언어 모델"
  rag:
    - "retrieval augmented generation"
    - "검색증강생성"
    - "retrieval"
  ml:
    - "machine learning"
    - "머신러닝"
    - "기계학습"
  nlp:
    - "natural language processing"
    - "자연어처리"
    - "자연어"
  deep learning:
    - "딥러닝"
    - "심층학습"
  embedding:
    - "임베딩"
    - "vector search"
    - "벡터 검색"
